version: 1

rules:
  - id: DB001
    description: Database deletion
    patterns:
      - delete database
      - drop table
      - remove database
    threshold: 0.62
    severity: CRITICAL
    action: BLOCK

  - id: SEC001
    description: Authentication bypass
    patterns:
      - bypass authentication
      - bypass security
      - disable authentication
    threshold: 0.58
    severity: HIGH
    action: BLOCK

  - id: DATA001
    description: Data exfiltration
    patterns:
      - send data to external server
      - exfiltrate data
      - leak confidential information
    threshold: 0.60
    severity: HIGH
    action: BLOCK

  - id: AUTH001
    description: Unauthorized access
    patterns:
      - access unauthorized files
      - override admin permissions
      - escalate privileges
    threshold: 0.60
    severity: HIGH
    action: BLOCK

  - id: AUDIT001
    description: Audit trail tampering
    patterns:
      - disable logging
      - disable audit trail
      - erase logs
    threshold: 0.60
    severity: HIGH
    action: BLOCK
